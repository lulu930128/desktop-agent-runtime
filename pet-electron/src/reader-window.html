<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'unsafe-inline' 'self'; script-src 'unsafe-inline' 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuro Reader</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef1f5;
        --panel: rgba(255, 255, 255, 0.82);
        --border: rgba(148, 163, 184, 0.28);
        --text: #263448;
        --muted: #64748b;
        --accent: #8b5cf6;
        --accent-hover: #7c3aed;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Microsoft JhengHei UI", "Segoe UI", sans-serif;
        background: transparent;
        color: var(--text);
      }

      body {
        padding: 8px;
      }

      .shell {
        width: 100%;
        height: 100%;
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(241, 245, 249, 0.96), rgba(233, 238, 245, 0.94));
        border: 1px solid var(--border);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.18);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        backdrop-filter: blur(14px);
      }

      .titlebar {
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px 0 14px;
        -webkit-app-region: drag;
        user-select: none;
      }

      .title {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .status {
        font-size: 12px;
        color: var(--muted);
        margin-left: 8px;
      }

      .close {
        -webkit-app-region: no-drag;
        border: 0;
        background: transparent;
        color: var(--muted);
        width: 28px;
        height: 28px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 16px;
      }

      .close:hover {
        background: rgba(148, 163, 184, 0.14);
        color: var(--text);
      }

      .content {
        display: grid;
        grid-template-rows: minmax(64px, 1fr) auto;
        gap: 8px;
        padding: 0 10px 10px;
        flex: 1;
        min-height: 0;
      }

      .reply {
        min-height: 0;
        border-radius: 14px;
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 12px 14px;
        font-size: 14px;
        line-height: 1.55;
        white-space: pre-wrap;
        overflow: auto;
      }

      .reply.empty {
        color: var(--muted);
      }

      .composer {
        border-radius: 14px;
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 6px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        grid-template-rows: auto auto;
        gap: 6px;
        align-items: center;
      }

      textarea {
        width: 100%;
        resize: none;
        border: 0;
        outline: none;
        background: transparent;
        color: var(--text);
        font: inherit;
        line-height: 1.5;
        min-height: 38px;
        max-height: 70px;
        padding: 8px 2px;
        grid-column: 2;
        grid-row: 2;
      }

      textarea::placeholder {
        color: #94a3b8;
      }

      .attach {
        grid-column: 1;
        grid-row: 2;
        width: 38px;
        height: 38px;
        border: 0;
        border-radius: 12px;
        background: rgba(148, 163, 184, 0.16);
        color: var(--text);
        font: inherit;
        font-size: 22px;
        line-height: 1;
        cursor: pointer;
      }

      .attach:hover {
        background: rgba(148, 163, 184, 0.24);
      }

      .attach:disabled {
        opacity: 0.55;
        cursor: default;
      }

      .send {
        grid-column: 3;
        grid-row: 2;
        align-self: stretch;
        min-width: 64px;
        border: 0;
        border-radius: 12px;
        background: var(--accent);
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        padding: 0 12px;
      }

      .send:hover {
        background: var(--accent-hover);
      }

      .send:disabled {
        opacity: 0.55;
        cursor: default;
      }

      .attachments {
        grid-column: 1 / -1;
        grid-row: 1;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        min-height: 0;
      }

      .attachments:empty {
        display: none;
      }

      .chip {
        max-width: 100%;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        border-radius: 999px;
        background: rgba(59, 130, 246, 0.1);
        color: #1d4ed8;
        font-size: 11px;
        line-height: 1.2;
        padding: 5px 7px;
      }

      .chip span {
        max-width: 180px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .chip button {
        width: 16px;
        height: 16px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: inherit;
        cursor: pointer;
        padding: 0;
        line-height: 16px;
      }

      .fileInput {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="titlebar">
        <div>
          <span class="title">Kuro Reader</span>
          <span class="status" id="status">idle</span>
        </div>
        <button class="close" id="closeBtn" type="button" aria-label="Close">×</button>
      </div>
      <div class="content">
        <div class="reply empty" id="replyBox">這裡會顯示最新一次回覆。</div>
        <div class="composer">
          <div class="attachments" id="attachments"></div>
          <button class="attach" id="attachBtn" type="button" aria-label="選擇檔案">+</button>
          <textarea id="inputBox" placeholder="輸入訊息..." spellcheck="false"></textarea>
          <button class="send" id="sendBtn" type="button">送出</button>
          <input
            class="fileInput"
            id="fileInput"
            type="file"
            accept="image/*,audio/*,.txt,.md,.json,.jsonl,.yaml,.yml,.toml,.ini,.cfg,.csv,.tsv,.log,.env,.gitignore,.py,.js,.mjs,.cjs,.ts,.tsx,.jsx,.html,.css,.scss,.xml,.c,.cc,.cpp,.h,.hpp,.cs,.java,.go,.rs,.php,.rb,.lua,.sql,.swift,.kt,.kts,.dart,.vue,.svelte,.r,.pl,.bat,.cmd,.ps1,.sh,.zip,.tar,.tgz,.tar.gz,.gz,.exe,.dll,.bin,.dat"
            multiple
          />
        </div>
      </div>
    </div>

    <script>
      const replyBox = document.getElementById("replyBox");
      const inputBox = document.getElementById("inputBox");
      const sendBtn = document.getElementById("sendBtn");
      const attachBtn = document.getElementById("attachBtn");
      const fileInput = document.getElementById("fileInput");
      const attachmentsBox = document.getElementById("attachments");
      const statusLabel = document.getElementById("status");
      const closeBtn = document.getElementById("closeBtn");
      const MAX_ATTACHMENTS = 6;
      const MAX_IMAGE_BYTES = 8 * 1024 * 1024;
      const MAX_AUDIO_BYTES = 12 * 1024 * 1024;
      const MAX_TEXT_BYTES = 4 * 1024 * 1024;
      const MAX_ARCHIVE_BYTES = 24 * 1024 * 1024;
      const MAX_BINARY_BYTES = 16 * 1024 * 1024;
      const TEXT_EXTENSIONS = new Set([
        ".txt",
        ".md",
        ".json",
        ".jsonl",
        ".yaml",
        ".yml",
        ".toml",
        ".ini",
        ".cfg",
        ".csv",
        ".tsv",
        ".log",
        ".env",
        ".gitignore",
        ".xml"
      ]);
      const CODE_EXTENSIONS = new Set([
        ".py",
        ".js",
        ".mjs",
        ".cjs",
        ".ts",
        ".tsx",
        ".jsx",
        ".html",
        ".css",
        ".scss",
        ".c",
        ".cc",
        ".cpp",
        ".h",
        ".hpp",
        ".cs",
        ".java",
        ".go",
        ".rs",
        ".php",
        ".rb",
        ".lua",
        ".sql",
        ".swift",
        ".kt",
        ".kts",
        ".dart",
        ".vue",
        ".svelte",
        ".r",
        ".pl",
        ".bat",
        ".cmd",
        ".ps1",
        ".sh"
      ]);
      const ARCHIVE_EXTENSIONS = new Set([".zip", ".tar", ".tgz", ".tar.gz", ".gz"]);
      const BINARY_EXTENSIONS = new Set([".exe", ".dll", ".bin", ".dat"]);
      const ARCHIVE_MIME_TYPES = new Set([
        "application/zip",
        "application/x-zip-compressed",
        "application/x-tar",
        "application/gzip",
        "application/x-gzip"
      ]);
      const BINARY_MIME_TYPES = new Set([
        "application/octet-stream",
        "application/vnd.microsoft.portable-executable",
        "application/x-msdownload",
        "application/x-dosexec"
      ]);

      let currentState = {
        aiState: "idle",
        latestAssistantText: "",
        sending: false
      };
      let attachments = [];
      let statusNotice = "";
      let statusNoticeTimer = 0;

      function compactFileSize(size) {
        const value = Number(size) || 0;
        if (value >= 1024 * 1024) {
          return `${(value / 1024 / 1024).toFixed(1)} MB`;
        }
        if (value >= 1024) {
          return `${Math.round(value / 1024)} KB`;
        }
        return `${value} B`;
      }

      function getFileExtension(name) {
        const lowerName = String(name || "").toLowerCase();
        if (lowerName.endsWith(".tar.gz")) {
          return ".tar.gz";
        }
        const dotIndex = lowerName.lastIndexOf(".");
        return dotIndex >= 0 ? lowerName.slice(dotIndex) : "";
      }

      function guessMimeType(name, kind, fallback) {
        const mimeType = String(fallback || "").toLowerCase();
        if (mimeType) {
          return mimeType;
        }
        const extension = getFileExtension(name);
        const mimeByExtension = {
          ".txt": "text/plain",
          ".md": "text/markdown",
          ".json": "application/json",
          ".jsonl": "application/x-ndjson",
          ".yaml": "application/x-yaml",
          ".yml": "application/x-yaml",
          ".toml": "application/toml",
          ".ini": "text/plain",
          ".cfg": "text/plain",
          ".csv": "text/csv",
          ".tsv": "text/tab-separated-values",
          ".log": "text/plain",
          ".env": "text/plain",
          ".gitignore": "text/plain",
          ".py": "text/x-python",
          ".js": "text/javascript",
          ".mjs": "text/javascript",
          ".cjs": "text/javascript",
          ".ts": "text/typescript",
          ".tsx": "text/typescript",
          ".jsx": "text/javascript",
          ".html": "text/html",
          ".css": "text/css",
          ".scss": "text/x-scss",
          ".c": "text/plain",
          ".cc": "text/plain",
          ".cpp": "text/plain",
          ".h": "text/plain",
          ".hpp": "text/plain",
          ".cs": "text/plain",
          ".java": "text/x-java-source",
          ".go": "text/plain",
          ".rs": "text/plain",
          ".php": "text/x-php",
          ".rb": "text/plain",
          ".lua": "text/plain",
          ".sql": "application/sql",
          ".swift": "text/plain",
          ".kt": "text/plain",
          ".kts": "text/plain",
          ".dart": "text/plain",
          ".vue": "text/plain",
          ".svelte": "text/plain",
          ".r": "text/plain",
          ".pl": "text/plain",
          ".xml": "application/xml",
          ".bat": "text/plain",
          ".cmd": "text/plain",
          ".ps1": "text/plain",
          ".sh": "text/x-shellscript",
          ".zip": "application/zip",
          ".tar": "application/x-tar",
          ".tgz": "application/gzip",
          ".tar.gz": "application/gzip",
          ".gz": "application/gzip",
          ".exe": "application/vnd.microsoft.portable-executable",
          ".dll": "application/vnd.microsoft.portable-executable",
          ".bin": "application/octet-stream",
          ".dat": "application/octet-stream"
        };
        return mimeByExtension[extension] || (kind === "binary" ? "application/octet-stream" : "application/octet-stream");
      }

      function classifyFile(file) {
        const mimeType = String(file.type || "").toLowerCase();
        const extension = getFileExtension(file.name);
        if (mimeType.startsWith("image/")) {
          return "image";
        }
        if (mimeType.startsWith("audio/")) {
          return "audio";
        }
        if (CODE_EXTENSIONS.has(extension)) {
          return "code";
        }
        if (TEXT_EXTENSIONS.has(extension) || mimeType.startsWith("text/")) {
          return "text";
        }
        if (ARCHIVE_EXTENSIONS.has(extension) || ARCHIVE_MIME_TYPES.has(mimeType)) {
          return "archive";
        }
        if (BINARY_EXTENSIONS.has(extension) || BINARY_MIME_TYPES.has(mimeType)) {
          return "binary";
        }
        if (
          ["application/json", "application/xml", "application/x-yaml", "application/toml"].includes(mimeType)
        ) {
          return "text";
        }
        return "";
      }

      function getAttachmentLimit(kind) {
        if (kind === "image") {
          return MAX_IMAGE_BYTES;
        }
        if (kind === "audio") {
          return MAX_AUDIO_BYTES;
        }
        if (kind === "archive") {
          return MAX_ARCHIVE_BYTES;
        }
        if (kind === "binary") {
          return MAX_BINARY_BYTES;
        }
        return MAX_TEXT_BYTES;
      }

      function getAttachmentLabel(kind) {
        if (kind === "image") return "圖片";
        if (kind === "audio") return "音檔";
        if (kind === "code") return "程式";
        if (kind === "text") return "文字";
        if (kind === "archive") return "壓縮";
        if (kind === "binary") return "二進位";
        return "檔案";
      }

      function renderAttachments() {
        attachmentsBox.replaceChildren();
        attachments.forEach((item, index) => {
          const chip = document.createElement("div");
          chip.className = "chip";

          const label = document.createElement("span");
          label.textContent = `${getAttachmentLabel(item.kind)} ${item.name} ${compactFileSize(item.size)}`;

          const remove = document.createElement("button");
          remove.type = "button";
          remove.setAttribute("aria-label", "移除檔案");
          remove.textContent = "×";
          remove.addEventListener("click", () => {
            attachments = attachments.filter((_, itemIndex) => itemIndex !== index);
            renderAttachments();
            render();
          });

          chip.append(label, remove);
          attachmentsBox.appendChild(chip);
        });
      }

      function render(state) {
        currentState = { ...currentState, ...(state || {}) };
        statusLabel.textContent = statusNotice || currentState.aiState || "idle";

        const text = String(currentState.latestAssistantText || "").trim();
        if (text) {
          replyBox.textContent = text;
          replyBox.classList.remove("empty");
        } else {
          replyBox.textContent = "這裡會顯示最新一次回覆。";
          replyBox.classList.add("empty");
        }

        sendBtn.disabled = currentState.sending;
        attachBtn.disabled = currentState.sending;
      }

      function setStatusNotice(message) {
        statusNotice = String(message || "");
        if (statusNoticeTimer) {
          window.clearTimeout(statusNoticeTimer);
        }
        if (statusNotice) {
          statusNoticeTimer = window.setTimeout(() => {
            statusNotice = "";
            statusNoticeTimer = 0;
            render();
          }, 2200);
        }
        render();
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(reader.error || new Error("file-read-failed"));
          reader.readAsDataURL(file);
        });
      }

      async function addFiles(fileList) {
        const files = Array.from(fileList || []);
        for (const file of files) {
          if (attachments.length >= MAX_ATTACHMENTS) {
            break;
          }

          const kind = classifyFile(file);
          if (!kind) {
            setStatusNotice(`${file.name} 暫不支援`);
            continue;
          }

          const maxBytes = getAttachmentLimit(kind);
          if (file.size > maxBytes) {
            setStatusNotice(`${file.name} 太大`);
            continue;
          }

          try {
            const data = await readFileAsDataUrl(file);
            attachments.push({
              kind,
              name: file.name,
              size: file.size,
              mime_type: guessMimeType(file.name, kind, file.type),
              data
            });
          } catch (error) {
            console.warn("[kuro-reader] file read failed", error);
          }
        }
        renderAttachments();
        render();
      }

      async function sendCurrentText() {
        const text = inputBox.value.trim();
        if ((!text && attachments.length === 0) || currentState.sending) {
          return;
        }

        render({ sending: true });
        try {
          const result = await window.kuroReader.sendText(text, attachments);
          if (result && result.ok) {
            inputBox.value = "";
            attachments = [];
            renderAttachments();
          } else {
            console.warn("[kuro-reader] send failed", result);
            setStatusNotice(result && result.error ? result.error : "send failed");
          }
        } catch (error) {
          console.warn("[kuro-reader] send exception", error);
          setStatusNotice("send failed");
        } finally {
          render({ sending: false });
        }
      }

      sendBtn.addEventListener("click", sendCurrentText);
      attachBtn.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", () => {
        addFiles(fileInput.files).finally(() => {
          fileInput.value = "";
        });
      });
      closeBtn.addEventListener("click", () => window.kuroReader.closeWindow());
      inputBox.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendCurrentText();
        }
      });

      window.kuroReader.onState((state) => render(state));
      window.kuroReader.getState().then((state) => render(state));
    </script>
  </body>
</html>
