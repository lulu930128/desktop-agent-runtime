paths:
  ROOT: "${HERE}"
  open_llm_vtuber_dir: "${ROOT}\\Open-LLM-VTuber"
  characters_dir: "${open_llm_vtuber_dir}\\characters"
  projects_dir: "${ROOT}\\projects"
  bridge_dir: "${ROOT}\\bridges"
  tts_dir: "${ROOT}\\gpt_sovits"
  tts_infer_dir: "${tts_dir}\\GPT_SoVITS\\configs"
  tts_infer_default: "tts_infer.yaml"
  tts_infer_template: "tts_infer_{character}.yaml"
  env_tts: "${ROOT}\\envs\\kuro-tts310"
  env_llm: "${ROOT}\\envs\\kuro-llm310"
  runtime_conf_path: "${open_llm_vtuber_dir}\\conf.launcher_runtime.yaml"
  logs_dir: "${ROOT}\\launcher_logs"
  pet_electron_dir: "${ROOT}\\pet-electron"
  pet_electron_preferred: true

network:
  bridge:
    host: "127.0.0.1"
    port: 1188
  tts:
    host: "127.0.0.1"
    port: 9881
  llm:
    host: "127.0.0.1"
    port: 23456
  pet_control:
    host: "127.0.0.1"
    port: 23567

bridge:
  translate_path: "/translate"
  debug_path: "/translate_debug"

llm:
  provider_env: "KURO_LLM_PROVIDER"
  default_provider: "openai_llm"
  openai:
    model_env: "OPENAI_LLM_MODEL"
    default_model: "gpt-4o"
    temperature_env: "OPENAI_LLM_TEMPERATURE"
    inject_key_env: "OPENAI_LLM_INJECT_KEY"
    api_key_env: "OPENAI_LLM_API_KEY"
    fallback_api_key_env: "OPENAI_API_KEY"
